# uvr.toml — R project manifest (managed by uvr)
# Reference: https://github.com/nbafrank/uvr
#
# All packages migrated from renv.lock (R 4.4.3, 152 packages).
# uvr.lock pins exact resolved versions after the first `uvr sync`.
#
# To bootstrap on a new machine:
#   uvr sync        — install R 4.4.3 + all packages
#   uvr doctor      — verify environment health
#
# To update a package:
#   uvr add <pkg>   — adds to [dependencies] and updates uvr.lock
#   uvr lock        — regenerate uvr.lock without installing

