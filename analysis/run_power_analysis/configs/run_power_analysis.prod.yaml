# * Power Analysis Configuration
# * Version: Prod (legacy 2-set split, set 2 of 2: n_lvl2 = 200, 400, 600, 800, 1000)
# * Superseded by prod_vm1–prod_vm5 for the full 3,645-cell grid (15 n_lvl2 values, 100–1500)
# * Retained for compatibility. Pair with prod_set1 for the 10-value 2,430-cell grid.
params:
  max_cores: 14 # ! ADJUST AS NEEDED: 14 for 16-core university VM; 8 for local M1 Max; leave blank for default min(4, availableCores()-4)
  n_lvl1: [3]
  n_lvl2: [200, 400, 600, 800, 1000]
  lvl1_effect_std: [0.10, 0.30, 0.50]
  lvl2_effect_std: [0.10, 0.30, 0.50]
  xlvl_effect_std: [0.10, 0.30, 0.50]
  icc: [0.10, 0.30, 0.50]
  rand_slope_std: [0.01, 0.09, 0.25]
  alpha: [0.05]
  use_REML: [TRUE]
  n_sims: 1000 # ! ADJUST AS NEEDED; 1K IS RECOMMENDED
  verbose: FALSE
  return_df: TRUE
  rand_seed: 8762
