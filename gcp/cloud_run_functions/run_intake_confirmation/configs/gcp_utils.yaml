# ================================================================
# GCP & BigQuery settings for the intake confirmation function
# ================================================================
# Subset of the scheduling function's config. This function needs
# GCP project info, BigQuery table references for updating
# _processed status, and Pub/Sub config for publishing follow-up
# scheduling messages. Messages arrive via Eventarc push
# subscription; outbound publishing uses the followup topic.
# ================================================================

gcp:
  project_id: "dkg-phd-thesis"
  location: "US"        # Multi-region for BigQuery datasets
  region: "us-east4"    # Specific region for Cloud Run functions

bq:
  dataset_id: "qualtrics"
  tables:
    # -- Intake (survey 0): enrollment, demographics, screening ------
    intake_raw: "stg_intake_responses"
    intake_clean: "int_intake_responses_scored"
    # -- Follow-ups (surveys 1-3): repeated measures -----------------
    # All three timepoints share the same schema and append to a
    # single table, differentiated by survey_id.
    followup_raw: "stg_followup_responses"
    followup_clean: "int_followup_responses_scored"

# -- Pub/Sub: follow-up scheduling topic -----------------------------
# After successful confirmation, publish to this topic to trigger
# the follow-up scheduling function (run-followup-scheduling).
pubsub:
  topic_id: "dkg-intake-processed"
  followup_topic_id: "dkg-followup-scheduling"
