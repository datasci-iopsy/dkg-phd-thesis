# ================================================================
# Pub/Sub -- Topic Configuration
# ================================================================
# Topics for asynchronous inter-function communication.
#
# dkg-intake-processed:
#   Published by run-qualtrics-scheduling after writing a survey
#   response to BigQuery. Consumed by run-intake-confirmation.
#
# dkg-followup-scheduling:
#   Published by run-intake-confirmation after sending the
#   confirmation SMS. Consumed by run-followup-scheduling.
#
# Eventarc subscriptions are created automatically when each
# consuming function is deployed with a Pub/Sub trigger.
#
# Managed by manage_pubsub.py. Run 'setup' to create topics;
# 'teardown' to delete them.
# ================================================================

pubsub:
  topics:
    - dkg-intake-processed
    - dkg-followup-scheduling
